# golangci-lint v2 配置
# 启用核心 linter，确保代码质量

version: "2"

run:
  # 单次运行超时时间
  timeout: 5m
  # Go 版本
  go: "1.25"

linters:
  # 禁用所有默认 linter，只启用明确指定的（v2 中替代 disable-all: true）
  default: none
  enable:
    - govet        # Go 编译器级别静态分析，捕获可疑代码结构
    - errcheck     # 检查未处理的错误返回值
    - staticcheck  # 增强版静态分析，捕获 bug 和性能问题
  # 各 linter 的专属配置（v2 中替代 linters-settings）
  settings:
    errcheck:
      # 排除常见合理忽略的函数（fmt 系列返回值通常不需要检查）
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - fmt.Printf
        - fmt.Println
        - fmt.Sprintf
        - fmt.Sscanf
      # 测试文件中的 errcheck 豁免
      check-type-assertions: false
      check-blank: false
  # 排除规则（v2 中替代 issues.exclude-rules）
  exclusions:
    rules:
      # 测试文件中的 errcheck 豁免
      - path: _test\.go
        linters:
          - errcheck
      # S3 包使用 manager.Uploader 系列 API，当前 AWS SDK v2 尚未提供完整替代方案
      # 待 transfermanager 成熟后迁移，届时移除此排除规则
      - path: internal/agentcore/foundation/store/object/s3/
        linters:
          - staticcheck
        text: "SA1019"

issues:
  # 不限制每类 linter 报告的问题数量
  max-issues-per-linter: 0
  # 不限制相同问题的报告数量
  max-same-issues: 0
